<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decision & Action</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0d0f12;       /* 깊고 깔끔한 다크 배경 */
            --text-main: #ffffff;      /* 메인 텍스트 화이트 */
            --text-sub: #777777;       /* 서브 텍스트 그레이 */
            
            /* 네(Yes) 테마: 빛나는 네온 그린 */
            --glow-yes: rgba(74, 222, 128, 0.85);
            --color-yes: #4ade80;
            
            /* 아니오(No) 테마: 빛나는 네온 오렌지 */
            --glow-no: rgba(251, 146, 60, 0.85);
            --color-no: #fb923c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Noto Sans KR', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
            overflow: hidden;
        }

        /* 메인 콘텐츠 영역 중앙 정렬 */
        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            margin-bottom: 60px; /* 하단 문구와의 간격 */
        }

        .title-kr {
            font-size: 1.25rem;
            font-weight: 500;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .title-en {
            font-size: 0.85rem;
            color: var(--text-sub);
            font-weight: 300;
            margin-bottom: 45px;
            letter-spacing: 0.5px;
        }

        /* 숫자 카운터 스타일 (아주 굵고 거대하게) */
        .counter-number {
            font-size: 5rem;
            font-weight: 900;
            line-height: 1;
            transition: all 0.5s ease;
        }

        /* 자바스크립트에서 선택에 따라 부여될 빛나는(Glow) 효과 클래스 */
        .glow-yes {
            color: var(--color-yes);
            text-shadow: 0 0 20px var(--glow-yes), 0 0 50px var(--glow-yes);
        }

        .glow-no {
            color: var(--color-no);
            text-shadow: 0 0 20px var(--glow-no), 0 0 50px var(--glow-no);
        }

        /* 하단 응원 메시지 영역 */
        .footer-message {
            position: absolute;
            bottom: 40px;
            font-size: 0.95rem;
            font-weight: 300;
            color: var(--text-sub);
            line-height: 1.6;
            letter-spacing: -0.3px;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h1 class="title-kr">나와 같은 선택을 한 사람들</h1>
        <p class="title-en">People who made the same choice as you</p>
        
        <div class="counter-number" id="counterNum">--명</div>
    </div>

    <div class="footer-message">
        당신의 앞으로의 길을 언제나 응원합니다.<br>I'll be by your side no matter what.
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const choice = urlParams.get('choice');
        const counterNum = document.getElementById('counterNum');

        // 기본 시작 숫자 (너무 0명부터 시작하면 썰렁할 수 있으니 임의로 설정. 원하면 0으로 변경 가능)
        const BASE_YES = 12;
        const BASE_NO = 8;

        // 4. 접속할 때마다 숫자가 매번 늘어나도록 처리하는 함수
        function updateAndGetVotes(type) {
            const storageKey = `protocol_votes_${type}`;
            let currentVotes = localStorage.getItem(storageKey);
            
            if (!currentVotes) {
                // 처음 접속 시 기본값 셋팅
                currentVotes = type === 'yes' ? BASE_YES : BASE_NO;
            } else {
                // 기존 데이터가 있으면 숫자로 변환
                currentVotes = parseInt(currentVotes);
            }

            // ★ QR 코드를 찍고 이 페이지가 열릴 때마다 무조건 1씩 추가 (요청하신 기능)
            currentVotes += 1;
            localStorage.setItem(storageKey, currentVotes);

            return currentVotes;
        }

        // URL 파라미터(?choice=yes 또는 ?choice=no)에 따라 색상/숫자 출력
        if (choice === 'yes') {
            const votes = updateAndGetVotes('yes');
            counterNum.innerText = `${votes}명`;
            counterNum.classList.add('glow-yes'); // 네온 그린 글로우 효과
        } else if (choice === 'no') {
            const votes = updateAndGetVotes('no');
            counterNum.innerText = `${votes}명`;
            counterNum.classList.add('glow-no'); // 네온 오렌지 글로우 효과
        } else {
            // 주소를 잘못 치고 들어온 경우
            counterNum.innerText = "ERROR";
            counterNum.style.fontSize = "2rem";
            counterNum.style.color = "red";
            counterNum.style.textShadow = "none";
        }
    </script>
</body>
</html>
